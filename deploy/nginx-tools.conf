# Nginx config snippet — add this inside your existing selfai.cc server block
# This routes /tools to the Research Agent frontend and backend

# Backend API + WebSocket
location /tools/api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;  # long timeout for analysis execution
}

# WebSocket
location /tools/ws/ {
    proxy_pass http://127.0.0.1:8001/ws/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
}

# Frontend (Next.js)
location /tools/ {
    proxy_pass http://127.0.0.1:3000/tools/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Next.js static assets
location /tools/_next/ {
    proxy_pass http://127.0.0.1:3000/tools/_next/;
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, immutable";
}
