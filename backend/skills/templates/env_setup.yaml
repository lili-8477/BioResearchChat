name: env_setup
description: "Environment setup skill — checks data dependencies, downloads missing models/references/atlases, builds Docker images, and verifies the execution environment is ready before running any analysis. Run this first when setting up a new analysis type."
analysis_type: setup
base_image: python-general
language: python
packages: []
tags:
  - setup
  - environment
  - docker
  - models
  - data
  - prerequisites
code_template: |
  # This skill is NOT a container script — it's a checklist for the agent.
  # The agent runs these steps on the HOST (not in Docker).
  #
  # === Environment Setup Checklist ===
  #
  # 1. CHECK DATA REGISTRY
  #    Read backend/data/registry.yaml to see all available datasets.
  #    Run: python -c "
  #      import sys; sys.path.insert(0, 'backend')
  #      from data.data_manager import DataManager
  #      dm = DataManager()
  #      print(dm.status_report())
  #    "
  #
  # 2. CHECK SKILL REQUIREMENTS
  #    For the target analysis, check what data is needed:
  #    python -c "
  #      import sys; sys.path.insert(0, 'backend')
  #      from data.data_manager import DataManager
  #      dm = DataManager()
  #      req = dm.check_requirements('scimilarity_cell_annotation')
  #      for m in req['missing']:
  #          print(f'MISSING: {m[\"name\"]} ({m[\"size_gb\"]}GB)')
  #      if req['ready']:
  #          print('All data available!')
  #    "
  #
  # 3. DOWNLOAD MISSING DATA
  #    ./scripts/download-model.sh <name>
  #    Or use the DataManager:
  #    python -c "
  #      import sys; sys.path.insert(0, 'backend')
  #      from data.data_manager import DataManager
  #      dm = DataManager()
  #      dm.download('scimilarity_v1.1')
  #    "
  #
  # 4. CHECK DOCKER IMAGES
  #    docker images | grep research-agent
  #    If missing, build:
  #    docker build -t research-agent/python-spatial:base -f images/python-spatial.Dockerfile .
  #
  # 5. VERIFY MOUNTS
  #    Check that data will be properly mounted:
  #    python -c "
  #      import sys; sys.path.insert(0, 'backend')
  #      from data.data_manager import DataManager
  #      dm = DataManager()
  #      for host, container in dm.get_all_mounts().items():
  #          print(f'{host} -> {container}')
  #    "
  #
  # 6. TEST RUN
  #    docker run --rm \
  #      -v ./data/user:/data/user:ro \
  #      -v ./data/models:/data/models:ro \
  #      research-agent/python-spatial:base \
  #      python -c "import scanpy; print('OK')"
