services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: biochat
      POSTGRES_USER: biochat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biochat_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data_cache:/data/datasets
      - ./data/user:/data/user
      - ./data/models:/data/models
      - workspaces:/workspaces
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://biochat:${POSTGRES_PASSWORD:-biochat_dev}@postgres:5432/biochat
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_BACKEND_URL=
        - NEXT_PUBLIC_BASE_PATH=
        - NEXT_PUBLIC_CONTROL_API_TOKEN=${CONTROL_API_TOKEN}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  data_cache:
  workspaces:
  pgdata:
